name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: volta-cli/action@v4

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Smoke-test the MCP server launcher
        shell: bash
        run: |
          # Mirrors how Claude Code launches the server: via mcp/launch.mjs.
          # Sends a tools/list request and asserts the four expected tool names.
          OUT=$(printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' '{"jsonrpc":"2.0","method":"notifications/initialized"}' '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' | node mcp/launch.mjs 2>/tmp/launch.err)
          echo "--- stderr ---"
          cat /tmp/launch.err || true
          echo "--- stdout ---"
          echo "$OUT"
          for tool in generate analyze_coverage extend_tests estimate_model; do
            if ! echo "$OUT" | grep -q "\"name\":\"$tool\""; then
              echo "missing tool: $tool"
              exit 1
            fi
          done

  validate-plugin-manifest:
    name: Validate plugin and marketplace manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json shape (top-level fields)
        run: |
          node -e "
            const fs = require('node:fs');
            const m = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json','utf8'));
            const required = ['name','version','description','mcpServers'];
            for (const k of required) {
              if (!(k in m)) { console.error('missing field:', k); process.exit(1); }
            }
            if (!m.mcpServers.coverwise) { console.error('mcpServers.coverwise missing'); process.exit(1); }
            console.log('plugin.json OK');
          "
      - name: Validate marketplace.json shape
        run: |
          node -e "
            const fs = require('node:fs');
            const m = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json','utf8'));
            if (!m.name || !Array.isArray(m.plugins) || m.plugins.length === 0) {
              console.error('marketplace.json malformed');
              process.exit(1);
            }
            console.log('marketplace.json OK');
          "
